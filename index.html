<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Seema</title>

<style>

html,body{
margin:0;
height:100%;
width:100%;
overflow:hidden;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;

/* Background image */
background-image:url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30");
background-size:cover;
background-position:center;
}

.container{
width:90%;
max-width:1700px;
backdrop-filter:blur(4px);
}

h1{
font-size:clamp(80px,8vw,160px);
letter-spacing:6px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 20px white;}
to{ text-shadow:0 0 70px yellow;}
}

h2{
font-size:clamp(40px,4vw,80px);
margin-bottom:30px;
}

#cake{
font-size:clamp(220px,15vw,360px);
cursor:pointer;
transition:transform .3s;
}

#cake:hover{
transform:scale(1.1);
}

.message{
font-size:clamp(28px,2vw,50px);
margin-top:25px;
}

/* Balloons */

.balloon{
position:absolute;
bottom:-120px;
font-size:90px;
animation:rise linear infinite;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-130vh);}
}

/* Hearts */

.heart{
position:absolute;
font-size:40px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* Fireworks */

.firework{
position:absolute;
width:12px;
height:12px;
background:white;
border-radius:50%;
animation:explode 1.6s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);}
100%{transform:scale(35);opacity:0;}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>🎉 HAPPY BIRTHDAY 🎉</h1>
<h2>SEEMA ❤️</h2>

<div id="cake">🎂</div>

<p class="message" id="msg">
Click anywhere to start the celebration!
</p>

</div>

<script>

const cake=document.getElementById("cake");
const msg=document.getElementById("msg");
const music=document.getElementById("music");

/* Strong music start for any interaction */

function startMusic(){
music.play().catch(()=>{});
}

document.body.addEventListener("click",startMusic,{once:true});
document.body.addEventListener("touchstart",startMusic,{once:true});
document.body.addEventListener("keydown",startMusic,{once:true});

/* Cake interaction */

cake.onclick=function(){

startMusic();

cake.innerHTML="🍰";

msg.innerHTML="Happy Birthday Seema ❤️ May your day be filled with love, joy and happiness!";

for(let i=0;i<70;i++){
createHeart();
}

for(let i=0;i<50;i++){
createFirework();
}

};

/* Balloons */

function createBalloon(){

let balloon=document.createElement("div");
balloon.className="balloon";
balloon.innerHTML="🎈";

balloon.style.left=Math.random()*100+"vw";
balloon.style.animationDuration=(7+Math.random()*6)+"s";

document.body.appendChild(balloon);

setTimeout(()=>balloon.remove(),13000);

}

setInterval(createBalloon,700);

/* Hearts */

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(30+Math.random()*60)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

/* Fireworks */

function createFirework(){

let fire=document.createElement("div");
fire.className="firework";

fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*80+"vh";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1600);

}

</script>

</body>
</html>
